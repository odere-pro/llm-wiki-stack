name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels: [feature, enhancement]
  - title: "Bug Fixes"
    labels: [bug, fix]
  - title: "Documentation"
    labels: [documentation, docs]
  - title: "CI"
    labels: [ci, chore, dependencies]

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [breaking, major]
  minor:
    labels: [feature, minor]
  patch:
    labels: [fix, patch, chore, docs]
  default: patch

autolabeler:
  - label: documentation
    files: ["docs/**/*", "*.md"]
  - label: ci
    files: [".github/**/*"]
  - label: chore
    title:
      - /^chore/i

template: |
  ## Release $RESOLVED_VERSION

  $CHANGES

  ### Schema version
  This release is compatible with schema_version 1 (declared in `example-vault/CLAUDE.md`).
