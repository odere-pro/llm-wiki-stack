name: smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Tier 2 — fresh-install + skill-schema smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        # Smoke scripts use pure shell + jq only. No Python.
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Fresh install smoke
        run: bash tests/smoke/fresh-install.sh
      - name: Skill-schema smoke
        run: bash tests/smoke/skill-schema.sh
